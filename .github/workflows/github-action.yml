name: Build and Publish

on: [push]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/core/runtime:latest

    services:
      rabbitmq:
        image: rabbitmq:latest
        ports:
          - 5672:5672
        options: --health-cmd "rabbitmqctl node_health_check" --health-interval 10s --health-timeout 5s --health-retries 5
        
    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Build
      run: dotnet build --configuration Release
    - name: Run tests
      run: dotnet test --configuration Release
    - name: Publish to GitHub Packages
      run: dotnet nuget push src/RabbitMQ.Client.Core.DependencyInjection/bin/Release/*.nupkg --source "https://nuget.pkg.github.com/alexpwnz/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
